<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minchus Mad Quest - OBS</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
:root{--bg:#1a0530;--panel:#2d1050;--p1c:#ff3db4;--p2c:#bf7fff;--accent:#ff80d5;--text:#f8e8ff;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Nunito',sans-serif;color:var(--text);container-type:size;container-name:root;}
/* ── outer layout: full viewport ── */
body{display:flex;align-items:stretch;justify-content:center;padding:0;background-image:radial-gradient(ellipse at 20% 10%,rgba(255,80,200,.35) 0%,transparent 55%),radial-gradient(ellipse at 80% 90%,rgba(140,60,255,.30) 0%,transparent 55%),radial-gradient(ellipse at 50% 50%,rgba(200,80,255,.12) 0%,transparent 70%);}
body.transparent-bg{background:transparent!important;background-image:none!important;}
body.transparent-bg html{background:transparent!important;}

/* ── play-area: vertical — cards top, board below ── */
.play-area{display:flex;flex-direction:column;align-items:stretch;width:100%;max-width:1300px;height:100%;}

/* ── players bar — normal flow at top ── */
.players-bar{display:flex;flex-direction:row;gap:10px;padding:8px 12px 16px;flex-shrink:0;}
.player-card{background:var(--panel);border-radius:14px;padding:8px 14px;border:2px solid transparent;transition:border-color .4s,box-shadow .4s;position:relative;overflow:visible;box-shadow:0 2px 16px rgba(180,60,255,.3);display:flex;align-items:center;gap:10px;flex:1;}
.player-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:16px 16px 0 0;}
.player-card.p1::before{background:var(--p1c);}
.player-card.p2::before{background:var(--p2c);}
.player-card.active{border-color:var(--accent);box-shadow:0 0 20px rgba(255,80,200,.6);}
.turn-badge{position:absolute;bottom:-10px;left:50%;transform:translateX(-50%) scale(.7);background:linear-gradient(135deg,#ff3db4,#9000ff);color:#fff;font-family:'Fredoka One',cursive;font-size:12px;padding:2px 14px;border-radius:20px;opacity:0;transition:all .4s;white-space:nowrap;}
.player-card.active .turn-badge{opacity:1;transform:translateX(-50%) scale(1);}
.player-name-row{display:flex;align-items:center;gap:10px;}
.player-avatar{width:44px;height:44px;border-radius:50%;flex-shrink:0;overflow:hidden;border:2px solid rgba(255,80,200,.4);background:rgba(180,60,255,.2);display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:18px;}
.player-avatar img{width:100%;height:100%;object-fit:cover;display:block;}
.player-name{font-family:'Fredoka One',cursive;font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.p1 .dot{background:var(--p1c);box-shadow:0 0 5px var(--p1c);}
.p2 .dot{background:var(--p2c);box-shadow:0 0 5px var(--p2c);}
.score-big{font-family:'Fredoka One',cursive;font-size:32px;line-height:1;margin-left:auto;padding-right:8px;}
.p1 .score-big{color:var(--p1c);text-shadow:0 0 25px rgba(255,61,180,.5);}
.p2 .score-big{color:var(--p2c);text-shadow:0 0 25px rgba(191,127,255,.5);}

/* ── board fills all space ── */
.board-area{flex:1;min-height:0;display:flex;flex-direction:column;align-items:stretch;padding:6px 8px 8px;}
.board-wrapper{flex:1;min-height:0;position:relative;}
#board-canvas{position:absolute;inset:0;width:100%;height:100%;border-radius:14px;display:block;}

/* ── overlays ── */
.overlay-bg{position:fixed;inset:0;background:rgba(15,0,40,.7);opacity:0;pointer-events:none;transition:opacity .3s;z-index:50;}
.overlay-bg.show{opacity:1;}

/* dice popup */
.dice-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:var(--panel);border:3px solid var(--accent);border-radius:3cqw;padding:3cqh 6cqw 4cqh;text-align:center;z-index:110;box-shadow:0 0 80px rgba(255,80,200,.4),0 20px 60px rgba(140,0,255,.6);transition:transform .35s cubic-bezier(.34,1.56,.64,1);min-width:40cqw;}
.dice-popup.show{transform:translate(-50%,-50%) scale(1);}
.dice-popup .roll-player{font-family:'Fredoka One',cursive;font-size:2.8cqw;color:#e0a0ff;margin-bottom:1.5cqh;}
.dice-popup .dice-row{display:flex;justify-content:center;gap:16px;margin-bottom:1.5cqh;}
.dice{width:9cqw;height:9cqw;background:linear-gradient(145deg,#fff,#f0e0ff);border-radius:1.5cqw;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);padding:0.8cqw;gap:0.3cqw;box-shadow:0 4px 18px rgba(180,60,255,.4),inset 0 1px 0 rgba(255,200,255,.5);border:2px solid rgba(255,80,200,.35);}
.dice.rolling{animation:diceRoll .12s linear infinite;}
@keyframes diceRoll{0%{transform:rotate(-10deg) scale(1.05);}50%{transform:rotate(10deg) scale(0.95);}100%{transform:rotate(-10deg) scale(1.05);}}
/* ── Pop-up icon animations ── */
@keyframes iconPulseStar{0%,100%{transform:scale(1);}50%{transform:scale(1.12);}}
@keyframes iconPulseStrong{0%,100%{transform:scale(1);}40%{transform:scale(1.35);}60%{transform:scale(1.28);}}
@keyframes iconPulseWeak{0%,100%{transform:scale(1);}50%{transform:scale(0.82);}}
@keyframes iconWobble{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
@keyframes iconWalk{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
.pop-icon.anim-star{animation:iconPulseStar 1.8s ease-in-out infinite;}
.pop-icon.anim-strong-heart{animation:iconPulseStrong 0.7s ease-in-out infinite;}
.pop-icon.anim-weak-heart{animation:iconPulseWeak 1.4s ease-in-out infinite;}
.pop-icon.anim-wobble{animation:iconWobble 1.2s ease-in-out infinite;}
.pop-icon.anim-walk{animation:iconWalk 0.5s ease-in-out infinite;}
.pop-icon.anim-purple{display:flex;align-items:center;justify-content:center;gap:0.3cqw;}
.pop-icon.anim-purple .pi-heart{display:inline-block;animation:iconPulseStrong 0.8s ease-in-out infinite;}
.pop-icon.anim-purple .pi-arrow-up{display:inline-block;animation:iconArrowUp 0.7s ease-in-out infinite;}
.pop-icon.anim-purple .pi-arrow-down{display:inline-block;animation:iconArrowDown 0.7s ease-in-out infinite;}
@keyframes iconArrowUp{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
@keyframes iconArrowDown{0%,100%{transform:translateY(0);}50%{transform:translateY(8px);}}
.pip{width:100%;height:100%;border-radius:50%;background:linear-gradient(135deg,#ff3db4,#9000ff);display:none;}
.pip.show{display:block;}
.dice-popup .roll-result{font-family:'Fredoka One',cursive;font-size:14cqw;color:var(--accent);line-height:1;text-shadow:0 0 60px rgba(255,128,213,.9),0 0 20px rgba(255,128,213,.5);transition:opacity .4s,transform .4s cubic-bezier(.34,1.56,.64,1);transform:scale(0.5);}
.dice-popup .roll-result.hidden{opacity:0;transform:scale(0.5);}
.dice-popup .roll-result.show{opacity:1;transform:scale(1);}

/* popup */
.popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:var(--panel);border:2px solid var(--accent);border-radius:24px;padding:32px 48px;text-align:center;z-index:100;box-shadow:0 20px 60px rgba(140,0,255,.5);transition:transform .35s cubic-bezier(.34,1.56,.64,1);width:70cqw;max-width:70cqw;}
.popup.show{transform:translate(-50%,-50%) scale(1);}
.popup .pop-icon{font-size:10cqw;margin-bottom:1cqh;}
.popup .pop-title{font-family:'Fredoka One',cursive;font-size:5cqw;color:var(--accent);margin-bottom:.6cqh;}
.popup .pop-desc{font-size:2.8cqw;color:#d8a0ff;line-height:1.5;margin-bottom:1.2cqh;}
.dismiss-bar{height:4px;background:rgba(255,80,200,.2);border-radius:4px;margin-top:1cqh;overflow:hidden;}
.dismiss-fill{height:100%;background:var(--accent);border-radius:4px;width:100%;transition:width linear;}

/* spinner popup */
.yellow-spinner-wrap{position:relative;width:100%;height:52px;border-radius:12px;border:2px solid var(--accent);background:rgba(80,0,140,.4);margin-top:6px;transition:box-shadow .4s,border-color .4s;}
.yellow-spinner-wrap.landed{border-color:#ff80d5;box-shadow:0 0 0 3px rgba(255,80,200,.6),0 0 30px 8px rgba(255,80,200,.5),0 0 60px 16px rgba(180,60,255,.35);}
.spinner-clip{position:absolute;inset:0;border-radius:10px;overflow:hidden;}
.yellow-spinner-wrap::before,.yellow-spinner-wrap::after{content:'';position:absolute;left:0;right:0;height:16px;z-index:2;pointer-events:none;}
.yellow-spinner-wrap::before{top:0;background:linear-gradient(to bottom,rgba(26,5,48,1),transparent);}
.yellow-spinner-wrap::after{bottom:0;background:linear-gradient(to top,rgba(26,5,48,1),transparent);}
.yellow-spinner-highlight{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:36px;background:rgba(255,80,200,.2);border-top:1px solid rgba(255,128,213,.5);border-bottom:1px solid rgba(255,128,213,.5);z-index:1;pointer-events:none;}
.yellow-spinner-track{display:flex;flex-direction:column;transition:transform 0s;position:relative;z-index:0;}
.yellow-spin-item{height:52px;display:flex;align-items:center;justify-content:center;padding:0 14px;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;color:rgba(248,232,255,.4);text-align:center;}
.yellow-spin-item.selected{color:var(--text);}

/* fullscreen stage/win */
.stage-transition{position:fixed;inset:0;background:linear-gradient(135deg,#2d0a4e,#1a0530,#3d006e);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2cqh;z-index:200;opacity:0;pointer-events:none;transition:opacity .5s;}
.stage-transition.show{opacity:1;pointer-events:all;}
.stage-transition .big-icon{font-size:16cqw;animation:pulse 1s ease infinite alternate;}
@keyframes pulse{from{transform:scale(1);}to{transform:scale(1.1);}}
.stage-transition h1{font-family:'Fredoka One',cursive;font-size:10cqw;color:var(--accent);}
.stage-transition p{font-size:4cqw;color:#d8a0ff;text-align:center;padding:0 4cqw;}
.win-screen{position:fixed;inset:0;background:rgba(15,0,40,.94);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2cqh;z-index:300;opacity:0;pointer-events:none;transition:opacity .5s;}
.win-screen.show{opacity:1;}
.win-screen .trophy{font-size:16cqw;animation:bounce .8s ease infinite alternate;}
@keyframes bounce{from{transform:translateY(0);}to{transform:translateY(-1cqh);}}
.win-screen h1{font-family:'Fredoka One',cursive;font-size:9cqw;background:linear-gradient(90deg,var(--p1c),var(--accent),var(--p2c));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;}
.win-screen p{font-size:3.5cqw;color:#d8a0ff;text-align:center;padding:0 4cqw;}

/* score float */
.score-float{position:fixed;font-family:'Fredoka One',cursive;font-size:5cqw;pointer-events:none;z-index:250;animation:floatUp 1.3s ease-out forwards;}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1);}80%{opacity:1;}100%{opacity:0;transform:translateY(-5cqh) scale(1.3);}}

/* waiting screen */
.waiting{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2cqh;z-index:400;}
.waiting h1{font-family:'Fredoka One',cursive;font-size:8cqw;color:var(--accent);}
.waiting p{font-size:3cqw;color:#d8a0ff;}
.spinner{width:7cqw;height:7cqw;border:0.6cqw solid rgba(180,60,255,.25);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="waiting" id="waiting"><div class="spinner"></div><h1>Minchus Mad Quest</h1><p>Waiting for the game to start...</p></div>
<div class="play-area">
<div class="players-bar">
  <div class="player-card p1" id="card-p1">
    <div class="turn-badge">TURN</div>
    <div class="player-avatar" id="avatar-p1"><span>1</span></div>
    <div class="player-name" id="pname-p1">P1</div>
    <div class="dot"></div>
    <div class="score-big" id="score-p1">0</div>
  </div>
  <div class="player-card p2" id="card-p2">
    <div class="turn-badge">TURN</div>
    <div class="player-avatar" id="avatar-p2"><span>2</span></div>
    <div class="player-name" id="pname-p2">P2</div>
    <div class="dot"></div>
    <div class="score-big" id="score-p2">0</div>
  </div>
</div>
<div class="board-area">
  <div class="board-wrapper"><canvas id="board-canvas"></canvas></div>
</div>
</div>
<div class="overlay-bg" id="overlayBg"></div>
<div class="dice-popup" id="dicePopup">
  <div class="roll-player" id="dicePopupPlayer">Rolling...</div>
  <div class="dice-row">
    <div class="dice" id="main-dice"><div class="pip" id="mp0"></div><div class="pip" id="mp1"></div><div class="pip" id="mp2"></div><div class="pip" id="mp3"></div><div class="pip" id="mp4"></div><div class="pip" id="mp5"></div><div class="pip" id="mp6"></div><div class="pip" id="mp7"></div><div class="pip" id="mp8"></div></div>
  </div>
  <div class="roll-result hidden" id="diceResult">6</div>
</div>
<div class="popup" id="eventPopup"><div class="pop-icon" id="popIcon">-</div><div class="pop-title" id="popTitle">Event!</div><div class="pop-desc" id="popDesc">Something happened</div><div class="dismiss-bar"><div class="dismiss-fill" id="dismissFill"></div></div></div>
<div class="popup" id="yellowPopup"><div class="pop-icon" id="yellowIcon">-</div><div class="pop-title">Special Event!</div><div class="pop-desc" id="yellowSpinDesc">Spinning...</div><div class="yellow-spinner-wrap"><div class="spinner-clip"><div class="yellow-spinner-highlight"></div><div class="yellow-spinner-track" id="yellowTrack"></div></div></div></div>
<div class="stage-transition" id="stageTrans"><div class="big-icon">🚀</div><h1 id="stageTransTitle">Bounce Back!</h1><p id="stageTransDesc">+5 pts — back to Start!</p></div>
<div class="win-screen" id="winScreen"><div class="trophy">🏆</div><h1 id="winTitle">Player 1 Wins!</h1><p id="winSub">Amazing game!</p></div>
<script>
// Transparent background mode: add ?transparent=1 to URL when using as OBS browser source
window._transparentBg = new URLSearchParams(location.search).get('transparent') === '1';
if(window._transparentBg){
  document.documentElement.style.background='transparent';
  document.body.classList.add('transparent-bg');
}
const socket=io({query:{type:'obs'}});
const PIP={1:[4],2:[0,8],3:[0,4,8],4:[0,2,6,8],5:[0,2,4,6,8],6:[0,2,3,5,6,8]};
let tileTypes=[],currentState=null,CFG={TILES_PER_BOARD:29,POINT_GOAL:50,BOARD_COLS:3};
const photos=[null,null],names=['Player 1','Player 2'];
socket.on('stateUpdate',s=>{currentState=s;if(s.playerNames){names[0]=s.playerNames[0];names[1]=s.playerNames[1];document.getElementById('pname-p1').textContent=names[0];document.getElementById('pname-p2').textContent=names[1];}document.getElementById('waiting').style.display='none';renderState(s);});
socket.on('tilesUpdate',d=>{tileTypes=d.tileTypes;if(d.CFG)Object.assign(CFG,d.CFG);CFG.BOARD_COLS=3;setupBoard();if(currentState)renderState(currentState);});
socket.on('avatarUpdate',d=>{const img=new Image();img.onload=()=>{photos[d.index]=img;document.getElementById('avatar-p'+(d.index+1)).innerHTML='<img src="'+d.dataUrl+'" alt="">';if(currentState)drawBoard(currentState);};img.src=d.dataUrl;});
const spinT={mp:null,ep:null};
function showDice(px,n){const p=PIP[n]||[];for(let i=0;i<9;i++){const e=document.getElementById(px+i);if(e)e.classList.toggle('show',p.includes(i));}}
function startRoll(id,px){const e=document.getElementById(id);e.classList.add('rolling');if(spinT[px])clearInterval(spinT[px]);spinT[px]=setInterval(()=>showDice(px,Math.floor(Math.random()*6)+1),70);}
function finishRoll(id,px,r){if(spinT[px]){clearInterval(spinT[px]);spinT[px]=null;}document.getElementById(id).classList.remove('rolling');showDice(px,r);}

let dicePopupTimer=null;
function showDicePopup(playerName){
  if(dicePopupTimer){clearTimeout(dicePopupTimer);dicePopupTimer=null;}
  document.getElementById('dicePopupPlayer').textContent=playerName+' is rolling...';
  const res=document.getElementById('diceResult');
  res.classList.add('hidden');
  document.getElementById('dicePopup').classList.add('show');
  document.getElementById('overlayBg').classList.add('show');
}
function resolveDicePopup(playerName,result){
  finishRoll('main-dice','mp',result);
  document.getElementById('dicePopupPlayer').textContent=playerName+' rolled...';
  const res=document.getElementById('diceResult');
  res.textContent=result;
  // animate the number in
  requestAnimationFrame(()=>{res.classList.remove('hidden');res.classList.add('show');});
  // keep popup open for 3.5s then close
  dicePopupTimer=setTimeout(()=>{
    document.getElementById('dicePopup').classList.remove('show');
    document.getElementById('overlayBg').classList.remove('show');
    res.classList.remove('show');res.classList.add('hidden');
    dicePopupTimer=null;
  },3500);
}
socket.on('animEvent',ev=>{
  if(ev.type==='diceStart'){startRoll('main-dice','mp');showDicePopup(names[ev.player]);}
  else if(ev.type==='diceResult'){resolveDicePopup(names[ev.player],ev.result);}
  else if(ev.type==='eventDiceStart'){startRoll('main-dice','mp');}
  else if(ev.type==='tilePopup'){
    finishRoll('main-dice','mp',ev.eventDiceResult||1);
    if(ev.scoreFloat)scoreFloat(ev.scoreFloat.player,ev.scoreFloat.value);
    // If spinner is still showing, wait for it to finish before showing popup
    if(window._spinnerActive){
      window._pendingPopup=ev;
    } else {
      showPopup(ev.icon,ev.title,ev.desc,ev.duration);
    }
  }
  else if(ev.type==='yellowSpin'||ev.type==='colorSpin'){spinYellow(ev.labels,ev.winIdx,ev.winIcon,ev.winTitle);}
  else if(ev.type==='stageUp'){const st=document.getElementById('stageTrans');st.classList.add('show');setTimeout(()=>{st.classList.remove('show');},3300);}
});
function showPopup(icon,title,desc,dur){
  if(dicePopupTimer){clearTimeout(dicePopupTimer);dicePopupTimer=null;}
  document.getElementById('dicePopup').classList.remove('show');
  const d=Math.max(dur*2,6000);
  const el=document.getElementById('popIcon');
  el.className='pop-icon';
  if(icon==='⭐'||icon==='🌟')          { el.textContent=icon; el.classList.add('anim-star'); }
  else if(icon==='💚')                   { el.textContent=icon; el.classList.add('anim-strong-heart'); }
  else if(icon==='❤️')                  { el.textContent=icon; el.classList.add('anim-weak-heart'); }
  else if(icon==='💤')                   { el.textContent=icon; el.classList.add('anim-wobble'); }
  else if(icon==='👟')                   { el.textContent=icon; el.classList.add('anim-walk'); }
  else if(icon==='💜⬆️')               { el.classList.add('anim-purple'); el.innerHTML='<span class="pi-heart">💜</span><span class="pi-arrow-up">⬆️</span>'; }
  else if(icon==='💜⬇️')               { el.classList.add('anim-purple'); el.innerHTML='<span class="pi-heart">💜</span><span class="pi-arrow-down">⬇️</span>'; }
  else                                   { el.textContent=icon; }
  document.getElementById('popTitle').textContent=title;
  document.getElementById('popDesc').textContent=desc;
  const f=document.getElementById('dismissFill');f.style.transition='none';f.style.width='100%';
  document.getElementById('eventPopup').classList.add('show');document.getElementById('overlayBg').classList.add('show');
  setTimeout(()=>{f.style.transition='width '+d+'ms linear';f.style.width='0%';},50);
  setTimeout(()=>{document.getElementById('eventPopup').classList.remove('show');document.getElementById('overlayBg').classList.remove('show');},d+100);
}
function spinYellow(labels,winIdx,winIcon,winTitle){
  const ITEM_H=52;
  const popup=document.getElementById('yellowPopup');
  const track=document.getElementById('yellowTrack');
  const total=labels.length;
  window._spinnerActive=true;
  window._pendingPopup=null;
  document.getElementById('yellowIcon').textContent='⭐';
  document.getElementById('yellowSpinDesc').textContent='Landing on...';
  track.innerHTML='';track.style.transition='none';track.style.transform='translateY(0)';
  labels.forEach((l,i)=>{
    const d=document.createElement('div');
    d.className='yellow-spin-item'+(i===total-1?' selected':'');
    if(typeof l==='object'&&l!==null){
      if(l.bg) d.style.background=l.bg;
      d.innerHTML=`<span style="font-size:22px;margin-right:8px">${l.icon||''}</span>${l.label||''}`;
    } else {
      d.textContent=l;
    }
    track.appendChild(d);
  });
  document.getElementById('yellowSpinDesc').textContent='Landing on...';
  popup.classList.add('show');document.getElementById('overlayBg').classList.add('show');
  const finalY=-((total-1)*ITEM_H)+8;
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    track.style.transition='transform 4s cubic-bezier(0.25,0.1,0.1,1)';
    track.style.transform='translateY('+finalY+'px)';
  }));
  setTimeout(()=>{
    const wrapEl=track.closest('.yellow-spinner-wrap');
    if(wrapEl) wrapEl.classList.add('landed');
    // Update icon and title to reflect what was selected
    if(winIcon) document.getElementById('yellowIcon').textContent=winIcon;
    if(winTitle) document.getElementById('yellowSpinDesc').textContent=winTitle;
    setTimeout(()=>{
      if(wrapEl) wrapEl.classList.remove('landed');
      popup.classList.remove('show');
      document.getElementById('overlayBg').classList.remove('show');
      window._spinnerActive=false;
      // Fire any popup that arrived while spinner was showing
      if(window._pendingPopup){
        const p=window._pendingPopup; window._pendingPopup=null;
        setTimeout(()=>showPopup(p.icon,p.title,p.desc,p.duration),200);
      }
    },2500);
  },4200);
}
function scoreFloat(pi,val){if(!currentState)return;const t=tilePos[Math.min(currentState.players[pi].tile,tilePos.length-1)];if(!t)return;const rect=canvas.getBoundingClientRect(),el=document.createElement('div');el.className='score-float';el.style.left=(rect.left+t.cx)+'px';el.style.top=(rect.top+t.cy)+'px';el.style.color=val>=0?'#00f5d4':'#ff4d6d';el.textContent=(val>=0?'+':'')+val;document.body.appendChild(el);setTimeout(()=>el.remove(),1400);}
function renderState(s){
  for(let i=0;i<2;i++){document.getElementById('score-p'+(i+1)).textContent=s.players[i].score;}
  document.getElementById('card-p1').classList.toggle('active',s.currentPlayer===0);
  document.getElementById('card-p2').classList.toggle('active',s.currentPlayer===1);
  if(s.gameOver){const w=s.players[0].score>=(CFG.POINT_GOAL||50)?0:1;document.getElementById('winTitle').textContent=names[w]+' Wins!';document.getElementById('winSub').textContent=names[0]+': '+s.players[0].score+' pts | '+names[1]+': '+s.players[1].score+' pts';setTimeout(()=>document.getElementById('winScreen').classList.add('show'),800);}
  else{document.getElementById('winScreen').classList.remove('show');}
  drawBoard(s);
}
const canvas=document.getElementById('board-canvas'),ctx=canvas.getContext('2d');
let tilePos=[];
const TILE_C={
  blue:   {t:'#5b9bd5',b:'#2e6bad',l:'#1a3e6b',r:'#88c4ff'},
  start:  {t:'#3ecf74',b:'#1e9e50',l:'#0d6130',r:'#7bffb2'},
  stageup:{t:'#ff9f43',b:'#d4720a',l:'#8a4400',r:'#ffd08a'},
  green:  {t:'#44d47a',b:'#1da851',l:'#0d6130',r:'#97ffbc'},
  purple: {t:'#b36bfa',b:'#7c32d0',l:'#4a1080',r:'#dbb4ff'},
  red:    {t:'#ff5e5e',b:'#cc1c1c',l:'#7a0000',r:'#ffaaaa'},
  yellow: {t:'#ffd93d',b:'#c9a200',l:'#7a6000',r:'#fff0a0'},
};
const TICON={green:String.fromCodePoint(0x1F607),purple:String.fromCodePoint(0x1F45F),red:String.fromCodePoint(0x1F608),yellow:String.fromCodePoint(0x2B50),stageup:String.fromCodePoint(0x1F680),start:String.fromCodePoint(0x1F3C1),blue:null};

function computeWindingPath(W,H,N,ts){
  // ts = tile size, so we pad by at least ts/2 to prevent clipping
  const half=ts/2+48;
  const pad=Math.max(W*0.07, half), padT=Math.max(H*0.07, half), padB=Math.max(H*0.07, half);
  const aW=W-pad*2, aH=H-padT-padB;
  let COLS=Math.round(Math.sqrt(N*(aW/aH)));
  COLS=Math.max(4,Math.min(COLS,12));
  const ROWS=Math.ceil(N/COLS);
  const cellW=aW/(COLS-1), cellH=aH/(ROWS-1);

  const pts=[];
  for(let i=0;i<N;i++){
    const row=Math.floor(i/COLS);
    const col=i%COLS;
    const gridRow=(ROWS-1)-row;
    const gridCol=(row%2===0)?col:(COLS-1-col);
    pts.push({x:pad+gridCol*cellW, y:padT+gridRow*cellH});
  }

  const centres=pts.map((p,i)=>{
    const prev=pts[Math.max(0,i-1)], next=pts[Math.min(pts.length-1,i+1)];
    return{x:p.x,y:p.y,angle:Math.atan2(next.y-prev.y,next.x-prev.x)};
  });

  const trackPts=[];
  for(let i=0;i<pts.length;i++){
    if(i===0){trackPts.push(pts[0]);continue;}
    for(let s=1;s<=12;s++){
      const t=s/12;
      trackPts.push({x:pts[i-1].x+(pts[i].x-pts[i-1].x)*t, y:pts[i-1].y+(pts[i].y-pts[i-1].y)*t});
    }
  }

  const arrowPts=[];
  for(let i=0;i<pts.length-1;i++){
    arrowPts.push({
      x:(pts[i].x+pts[i+1].x)/2, y:(pts[i].y+pts[i+1].y)/2,
      angle:Math.atan2(pts[i+1].y-pts[i].y, pts[i+1].x-pts[i].x)
    });
  }
  return{centres,trackPts,arrowPts,cellW,cellH};
}

function setupBoard(){
  const wr=canvas.parentElement,rect=wr.getBoundingClientRect();
  canvas.width=Math.floor(rect.width);canvas.height=Math.floor(rect.height);
  const W=canvas.width,H=canvas.height,N=tileTypes.length;if(!N)return;
  // Estimate grid to get cell size, derive tile size from that
  const aW=W*0.88, aH=H*0.86;
  let COLS=Math.round(Math.sqrt(N*(aW/aH)));
  COLS=Math.max(4,Math.min(COLS,12));
  const ROWS=Math.ceil(N/COLS);
  const estCellW=aW/(COLS-1), estCellH=aH/(ROWS-1);
  const minCell=Math.min(estCellW,estCellH);
  const ts=Math.max(24,Math.min(Math.floor(minCell*0.80),90));
  const{centres,trackPts,arrowPts}=computeWindingPath(W,H,N,ts);
  tilePos=centres.map(({x,y})=>({cx:x,cy:y,x:x-ts/2,y:y-ts/2,w:ts,h:ts,s:ts,angle:0}));
  tilePos._track=trackPts;
  tilePos._arrows=arrowPts;
  if(currentState)drawBoard(currentState);
}

function drawTileObs(t,type,idx){
  const c=TILE_C[type]||TILE_C.blue;
  const{cx,cy,w,h,angle}=t,rad=Math.max(6,w*.20);
  const hw=w/2,hh=h/2,tx=-hw,ty=-hh;
  ctx.save();
  ctx.translate(cx,cy);ctx.rotate(angle||0);
  // face
  const g=ctx.createLinearGradient(tx,ty,tx,ty+h);g.addColorStop(0,c.t);g.addColorStop(1,c.b);
  ctx.fillStyle=g;rr(tx,ty,w,h,rad);ctx.fill();
  // shine
  const sh=ctx.createLinearGradient(tx,ty,tx,ty+h*.35);sh.addColorStop(0,'rgba(255,255,255,.30)');sh.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sh;rr(tx+2,ty+2,w-4,h*.35,rad*.6);ctx.fill();
  // border
  ctx.strokeStyle=c.r;ctx.lineWidth=1.8;rr(tx,ty,w,h,rad);ctx.stroke();
  // number — upright
  const ns=Math.max(8,w*.18);
  ctx.save();ctx.rotate(-(angle||0));ctx.globalAlpha=.7;ctx.fillStyle='#000';
  ctx.font='bold '+ns+'px Nunito,sans-serif';ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText(idx+1,0,ty+3);ctx.restore();
  // icon — upright
  const ic=TICON[type];
  if(ic){ctx.save();ctx.rotate(-(angle||0));ctx.font=(w*.38)+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(ic,0,0);ctx.restore();}
  ctx.restore();
}

function drawBoard(s){
  if(!tilePos.length)return;
  const W=canvas.width,H=canvas.height;ctx.clearRect(0,0,W,H);
  if(!window._transparentBg){const bg=ctx.createLinearGradient(0,0,W,H);bg.addColorStop(0,'#2a0545');bg.addColorStop(1,'#1a0535');ctx.fillStyle=bg;rr(0,0,W,H,14);ctx.fill();}
  // track
  const ts=tilePos[0].s,track=tilePos._track||tilePos;
  ctx.save();ctx.lineCap='round';ctx.lineJoin='round';
  ctx.strokeStyle='#6a1090';ctx.lineWidth=ts*1.0;
  ctx.beginPath();ctx.moveTo(track[0].x,track[0].y);
  for(let i=1;i<track.length;i++)ctx.lineTo(track[i].x,track[i].y);
  ctx.stroke();
  ctx.strokeStyle='#9030c0';ctx.lineWidth=ts*0.68;ctx.stroke();
  ctx.restore();
  // direction arrows — one chevron per gap between tiles, exactly centred
  const arrows=tilePos._arrows||[];
  for(let i=0;i<arrows.length;i++){
    const{x:bx,y:by,angle:ang}=arrows[i];
    const sz=ts*0.15;
    ctx.save();ctx.translate(bx,by);ctx.rotate(ang);
    ctx.globalAlpha=0.22;ctx.strokeStyle='#fff';ctx.lineWidth=ts*0.13;
    ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();ctx.moveTo(-sz*0.5,sz*0.5);ctx.lineTo(sz*0.5,0);ctx.lineTo(-sz*0.5,-sz*0.5);
    ctx.stroke();ctx.restore();
  }
  for(let i=0;i<tileTypes.length;i++){const t=tilePos[i];if(!t)continue;drawTileObs(t,tileTypes[i]||'blue',i);}
  if(!s||!s.players)return;
  const same=s.players[0].tile===s.players[1].tile;
  drawTok(s.players[0].tile,'#ff4d6d',0,same?-1:0);drawTok(s.players[1].tile,'#00f5d4',1,same?1:0);
}

function drawTok(ti,col,pi,off){
  const t=tilePos[Math.min(ti,tilePos.length-1)];if(!t)return;
  // Token radius: 42% of tile but with a generous minimum so it reads at small sizes
  const r=Math.max(t.s*.42, 14);
  const ox=off*r*1.3, cx=t.cx+ox, cy=t.cy;
  ctx.save();

  // Dark backdrop so token always contrasts against any tile colour
  ctx.beginPath();ctx.arc(cx,cy,r+3,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fill();

  // Tight intense glow — halved spread, doubled intensity via extra passes
  ctx.shadowColor=col;ctx.shadowBlur=r*1.75;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
  ctx.shadowBlur=r*1.75;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=r*2.5;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle=col;ctx.lineWidth=8;ctx.stroke();
  ctx.shadowBlur=r*2.5;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
  ctx.shadowBlur=0;ctx.shadowColor='transparent';

  // Photo or initial letter
  const ph=photos[pi];
  if(ph){
    ctx.save();ctx.beginPath();ctx.arc(cx,cy,r*.9,0,Math.PI*2);ctx.clip();
    ctx.drawImage(ph,cx-r*.9,cy-r*.9,r*1.8,r*1.8);ctx.restore();
  } else {
    // Solid fill so letter is legible
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
    ctx.fillStyle='#fff';
    ctx.font=`bold ${Math.max(r*.9,11)}px Fredoka One,cursive`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(names[pi][0].toUpperCase(),cx,cy+1);
  }

  // Thick white ring — very visible at any size
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.9)';ctx.lineWidth=3;ctx.stroke();

  // Coloured outer ring for extra pop
  ctx.beginPath();ctx.arc(cx,cy,r+3,0,Math.PI*2);
  ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.stroke();

  ctx.restore();
}

function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
window.addEventListener('load',()=>{
  showDice('mp',1);
  document.getElementById('popIcon').textContent=String.fromCodePoint(0x2B50);
  document.getElementById('yellowIcon').textContent=String.fromCodePoint(0x2B50);
});
window.addEventListener('resize',()=>{if(tileTypes.length)setupBoard();});
</script>
