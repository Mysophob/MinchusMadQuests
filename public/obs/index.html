<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minchus Mad Quest - OBS</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;800&display=swap"
    rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      /* ── Core palette ─────────────────────────────── */
      --bg: #953C54;
      --bg2: #B4647A;
      --panel: #d696a7;
      --accent: #ECBCA6;
      --text: #fff2ed;
      --text-special: #ecbca6;
      --text-dark: #2a1018;
      --border: #fff2ed;

      /* ── Player colors ────────────────────────────── */
      --p1c: #ff0d0d;
      --p2c: #21f0ff;

      /* ── Spinner / dice pip gradient ─────────────── */
      --pip-a: #702D6A;
      --pip-b: #874B82;

      /* ── Dice face ────────────────────────────────── */
      --dice-face-a: #fff2ed;
      --dice-face-b: #ffe1d3;

      /* ── Override pill gradient ───────────────────── */
      --pill-a: #ECBCA6;
      --pill-b: #C78A6E;

      /* ── Legacy accent (spinner landed border) ────── */
      --accent-old: #F6E4E9;

      /* ── Popups  ────── */
      --popup-dropshadow: #F6E4E9;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: 'Nunito', sans-serif;
      color: var(--text);
      container-type: size;
      container-name: root;
    }

    /* ── outer layout: full viewport ── */
    body {
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 0;
      background: transparent;
    }

    body.transparent-bg {
      background: transparent !important;
      background-image: none !important;
    }

    body.transparent-bg html {
      background: transparent !important;
    }

    /* bg-overlay: the purple background layer, faded by ?transparent param */
    #bg-overlay {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: var(--bg);
      background-image: radial-gradient(ellipse at 20% 10%, rgba(240, 114, 160, .35) 0%, transparent 55%), radial-gradient(ellipse at 80% 90%, rgba(160, 70, 110, .30) 0%, transparent 55%), radial-gradient(ellipse at 50% 50%, rgba(170, 80, 120, .12) 0%, transparent 70%);
      transition: opacity .3s;
      pointer-events: none;
    }

    /* ── play-area: vertical — cards top, board below ── */
    .play-area {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      width: 100%;
      max-width: 1300px;
      height: 100%;
      overflow: hidden;
    }

    /* ── players bar — stacked vertically, grows to share space with board ── */
    .players-bar {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 6px 10px 4px;
      flex: 3;
      min-height: 0;
      max-height: 35%;
      position: relative;
    }

    /* each card grows equally to fill the bar */
    .player-card {
      background: var(--panel);
      border-radius: 18px;
      padding: 8px 18px;
      border: 2px solid rgba(255, 242, 237, .5);
      transition: border-color .4s, box-shadow .4s;
      position: relative;
      overflow: hidden;
      box-shadow: 0 2px 20px rgba(180, 80, 120, .35);
      display: flex;
      align-items: center;
      gap: 16px;
      flex: 1;
      min-height: 0;
    }

    .player-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      border-radius: 18px 18px 0 0;
    }

    .player-card.p1::before {
      background: var(--p1c);
    }

    .player-card.p2::before {
      background: var(--p2c);
    }

    .player-card.active {
      border-color: rgba(255, 242, 237, .5);
      /*box-shadow:0 0 0 3px rgba(255,242,237,.9), 0 0 28px rgba(240,114,160,.5);*/
    }

    .turn-badge {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%) scale(.7);
      background: linear-gradient(135deg, var(--p1c), var(--p2c));
      color: var(--text);
      font-family: 'Fredoka One', cursive;
      font-size: 14px;
      padding: 3px 16px;
      border-radius: 20px;
      opacity: 0;
      transition: all .4s;
      white-space: nowrap;
    }

    .player-card.active .turn-badge {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    .player-name-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .player-avatar {
      width: clamp(48px, 8cqh, 100px);
      height: clamp(48px, 8cqh, 100px);
      border-radius: 50%;
      flex-shrink: 0;
      overflow: hidden;
      border: 3px solid rgba(255, 242, 237, .5);
      background: rgba(255, 242, 237, .25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fredoka One', cursive;
      font-size: clamp(20px, 3.5cqh, 44px);
      container-type: size;
      color: var(--text-dark);
    }

    .player-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .player-name {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(24px, 5cqh, 80px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .p1 .player-name {
      color: var(--text);
    }

    .p2 .player-name {
      color: var(--text);
    }

    .dot {
      display: none;
    }

    .score-big {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(36px, 7cqh, 110px);
      line-height: 1;
      margin-left: auto;
      padding-right: 4px;
      flex-shrink: 0;
    }

    .p1 .score-big {
      color: var(--p1c);
      text-shadow: 0 0 16px rgba(232, 64, 90, .5);
    }

    .p2 .score-big {
      color: var(--p2c);
      text-shadow: 0 0 16px rgba(160, 112, 200, .5);
    }


    /* ── board fills remaining space (same as before) ── */
    .board-area {
      flex: 5;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      padding: 6px 8px 8px;
    }

    .board-wrapper {
      flex: 1;
      min-height: 0;
      position: relative;
    }

    #board-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border-radius: 14px;
      display: block;
    }

    /* ── overlays ── */
    .overlay-bg {
      position: fixed;
      inset: 0;
      background: rgba(15, 0, 40, .7);
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
      z-index: 50;
    }

    .overlay-bg.show {
      opacity: 1;
    }

    body.transparent-bg .overlay-bg {
      display: none;
    }

    body.transparent-bg .popup {
      box-shadow: 0 0 0 2px var(--accent) 0 8px 40px 8px var(--accent), 0 0 80px 20px var(--accent);
    }

    body.transparent-bg .dice-popup {
      box-shadow: 0 0 0 2px var(--accent), 0 8px 40px 8px var(--accent), 0 0 80px 20px var(--accent);
    }

    /* dice popup */
    /* All popups use vw units — in OBS the widget IS the viewport, so vw = widget width */
    .dice-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: var(--panel);
      border: 3px solid var(--border);
      border-radius: 4vw;
      padding: 4vw 6vw 5vw;
      text-align: center;
      z-index: 110;
      box-shadow: 0 0 80px var(--popup-dropshadow), 0 20px 60px var(--popup-dropshadow);
      transition: transform .35s cubic-bezier(.34, 1.56, .64, 1);
      min-width: 80vw;
      max-width: 92vw;
    }

    .dice-popup.show {
      transform: translate(-50%, -50%) scale(1);
    }

    .dice-popup .roll-player {
      font-family: 'Fredoka One', cursive;
      font-size: 7vw;
      color: var(--text);
      margin-bottom: 3vw;
    }

    .dice-popup .dice-row {
      display: flex;
      justify-content: center;
      gap: 3vw;
      margin-bottom: 3vw;
    }

    .dice {
      width: 18vw;
      height: 18vw;
      background: linear-gradient(145deg, var(--dice-face-a), var(--dice-face-b));
      border-radius: 3vw;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      padding: 1.5vw;
      gap: 0.5vw;
      box-shadow: 0 4px 18px rgba(180, 80, 120, .4), inset 0 1px 0 rgba(255, 200, 255, .5);
      border: 2px solid rgba(240, 114, 160, .35);
    }

    .dice.rolling {
      animation: diceRoll .12s linear infinite;
    }

    @keyframes diceRoll {
      0% {
        transform: rotate(-10deg) scale(1.05);
      }

      50% {
        transform: rotate(10deg) scale(0.95);
      }

      100% {
        transform: rotate(-10deg) scale(1.05);
      }
    }

    /* ── Pop-up icon animations ── */
    @keyframes iconPulseStar {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.12);
      }
    }

    @keyframes iconPulseStrong {

      0%,
      100% {
        transform: scale(1);
      }

      40% {
        transform: scale(1.35);
      }

      60% {
        transform: scale(1.14);
      }
    }

    @keyframes iconPulseWeak {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(0.82);
      }
    }

    @keyframes iconWobble {
      0% {
        transform: translateX(0);
      }

      16% {
        transform: translateX(-6px);
      }

      33% {
        transform: translateX(6px);
      }

      50% {
        transform: translateX(-5px);
      }

      66% {
        transform: translateX(5px);
      }

      83% {
        transform: translateX(-2px);
      }

      100% {
        transform: translateX(0);
      }
    }

    @keyframes iconWalk {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-7px);
      }
    }

    @keyframes iconFlap {

      0%,
      100% {
        transform: translateY(0) rotate(-5deg);
      }

      30% {
        transform: translateY(-10px) rotate(8deg);
      }

      60% {
        transform: translateY(-4px) rotate(-3deg);
      }
    }

    .pop-icon.anim-star {
      animation: iconPulseStar 1.8s ease-in-out infinite;
    }

    .pop-icon.anim-strong-heart {
      animation: iconPulseStrong 0.7s ease-in-out infinite;
    }

    .pop-icon.anim-weak-heart {
      animation: iconPulseWeak 1.4s ease-in-out infinite;
    }

    .pop-icon.anim-wobble {
      animation: iconWobble 1.4s linear infinite;
    }

    .pop-icon.anim-walk {
      animation: iconWalk 0.5s ease-in-out infinite;
    }

    .pop-icon.anim-flap {
      animation: iconFlap 0.7s ease-in-out infinite;
    }

    .pop-icon.anim-purple {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1vw;
    }

    .pop-icon.anim-purple .pi-heart {
      display: inline-block;
      animation: iconPulseStrong 0.8s ease-in-out infinite;
    }

    .pop-icon.anim-purple .pi-arrow-up {
      display: inline-block;
      animation: iconArrowUp 0.7s ease-in-out infinite;
    }

    .pop-icon.anim-purple .pi-arrow-down {
      display: inline-block;
      animation: iconArrowDown 0.7s ease-in-out infinite;
    }

    @keyframes iconArrowUp {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    @keyframes iconArrowDown {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(8px);
      }
    }

    .pip {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--pill-a), var(--pill-b));
      display: none;
    }

    .pip.show {
      display: block;
    }

    .dice-popup .roll-result {
      font-family: 'Fredoka One', cursive;
      font-size: 28vw;
      color: var(--text-special);
      line-height: 1;
      text-shadow: 0 0 60px rgba(240, 114, 160, .9), 0 0 20px rgba(240, 114, 160, .5);
      transition: opacity .4s, transform .4s cubic-bezier(.34, 1.56, .64, 1);
      transform: scale(0.5);
    }

    .dice-popup .roll-result.hidden {
      opacity: 0;
      transform: scale(0.5);
    }

    .dice-popup .roll-result.show {
      opacity: 1;
      transform: scale(1);
    }

    /* popup — constrained to viewport, text sized to widget width */
    .popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: 5vw;
      padding: 5vw 6vw;
      text-align: center;
      z-index: 100;
      box-shadow: 0 20px 60px var(--accent);
      transition: transform .35s cubic-bezier(.34, 1.56, .64, 1);
      width: 90vw;
      max-width: 90vw;
      box-sizing: border-box;
    }

    .popup.show {
      transform: translate(-50%, -50%) scale(1);
    }

    .popup .pop-icon {
      font-size: 18vw;
      margin-bottom: 2vw;
      line-height: 1;
    }

    .pop-icon-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 2vw;
    }

    .pop-icon-wrap .pop-icon {
      font-size: 18vw;
      margin-bottom: 0;
      line-height: 1;
    }

    .pop-override-pill {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-15deg);
      background: linear-gradient(135deg, var(--pill-a), var(--pill-b));
      color: var(--text);
      font-family: 'Fredoka One', cursive;
      font-size: 4vw;
      padding: 1vw 3vw;
      border-radius: 20px;
      white-space: nowrap;
      box-shadow: 0 2px 16px rgba(255, 60, 180, .7);
      letter-spacing: 0.04em;
      z-index: 10;
    }

    .pop-override-pill.show {
      display: block;
    }

    .popup .pop-title {
      font-family: 'Fredoka One', cursive;
      font-size: 11vw;
      color: var(--text-special);
      margin-bottom: 2vw;
      line-height: 1.1;
    }

    .popup .pop-desc {
      font-size: 6.5vw;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 3vw;
    }

    .dismiss-bar {
      height: 5px;
      background: var(--bg);
      border-radius: 4px;
      margin-top: 2vw;
      overflow: hidden;
    }

    .dismiss-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      width: 100%;
      transition: width linear;
    }

    /* spinner popup */
    .yellow-spinner-wrap {
      position: relative;
      width: 100%;
      height: 14vw;
      border-radius: 3vw;
      border: 2px solid var(--accent);
      background: rgba(45, 15, 25, .4);
      margin-top: 2vw;
      transition: box-shadow .4s, border-color .4s;
    }

    .yellow-spinner-wrap.landed {
      border-color: var(--accent-old);
      /* box-shadow: 0 0 0 3px rgba(240, 114, 160, .6), 0 0 30px 8px rgba(240, 114, 160, .5), 0 0 60px 16px rgba(180, 80, 120, .35); */
    }

    .spinner-clip {
      position: absolute;
      inset: 0;
      border-radius: 2.5vw;
      overflow: hidden;
    }

    .yellow-spinner-wrap::before,
    .yellow-spinner-wrap::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      height: 4vw;
      z-index: 2;
      pointer-events: none;
    }

    .yellow-spinner-wrap::before {
      top: 0;
      /*background: linear-gradient(to bottom, rgba(26, 5, 48, 1), transparent);*/
    }

    .yellow-spinner-wrap::after {
      bottom: 0;
      /*ackground: linear-gradient(to top, rgba(26, 5, 48, 1), transparent);*/
    }

    .yellow-spinner-highlight {
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 14vw;
      z-index: 1;
      pointer-events: none;
      background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(240, 114, 160, 0.18) 0%, transparent 100%);
      box-shadow: inset 0 0 4vw 1vw var(--accent);
    }

    .yellow-spinner-track {
      display: flex;
      flex-direction: column;
      transition: transform 0s;
      position: relative;
      z-index: 0;
    }

    .yellow-spin-item {
      height: 14vw;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 3vw;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 6vw;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 0;
      color: rgba(248, 232, 255, .4);
      text-align: center;
    }

    .yellow-spin-item.selected {
      color: var(--text);
    }

    /* fullscreen stage/win */
    .stage-transition {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #2d0a4e, #1a0530, #3d006e);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 4vw;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity .5s;
    }

    .stage-transition.show {
      opacity: 1;
      pointer-events: all;
    }

    .stage-transition .big-icon {
      font-size: 28vw;
      animation: pulse 1s ease infinite alternate;
    }

    @keyframes pulse {
      from {
        transform: scale(1);
      }

      to {
        transform: scale(1.1);
      }
    }

    .stage-transition h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 16vw;
      color: var(--accent);
    }

    .stage-transition p {
      font-size: 7vw;
      color: var(--text);
      text-align: center;
      padding: 0 5vw;
    }

    .win-screen {
      position: fixed;
      inset: 0;
      background: rgba(15, 0, 40, .94);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 4vw;
      z-index: 300;
      opacity: 0;
      pointer-events: none;
      transition: opacity .5s;
    }

    .win-screen.show {
      opacity: 1;
    }

    .win-screen .trophy {
      font-size: 28vw;
      animation: bounce .8s ease infinite alternate;
    }

    @keyframes bounce {
      from {
        transform: translateY(0);
      }

      to {
        transform: translateY(-2vw);
      }
    }

    .win-screen h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 14vw;
      background: linear-gradient(90deg, var(--p1c), var(--accent), var(--p2c));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
    }

    .win-screen p {
      font-size: 6vw;
      color: var(--text);
      text-align: center;
      padding: 0 5vw;
    }

    /* score float */
    .score-float {
      position: fixed;
      font-family: 'Fredoka One', cursive;
      font-size: 10vw;
      pointer-events: none;
      z-index: 250;
      animation: floatUp 1.3s ease-out forwards;
    }

    @keyframes floatUp {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      80% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        transform: translateY(-8vw) scale(1.3);
      }
    }

    /* waiting screen */
    .waiting {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4vw;
      z-index: 400;
      padding: 6vw;
      text-align: center;
    }

    .waiting h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 9vw;
      color: var(--accent);
      line-height: 1.15;
      word-break: break-word;
    }

    .waiting p {
      font-size: 5vw;
      color: var(--text);
    }

    .spinner {
      width: 10vw;
      height: 10vw;
      border: 1vw solid rgba(180, 80, 120, .25);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="bg-overlay"></div>
  <div class="waiting" id="waiting">
    <div class="spinner"></div>
    <h1>Minchus Mad Quest</h1>
    <p>Waiting for the game to start...</p>
  </div>
  <div class="play-area">
    <div class="players-bar">
      <div class="player-card p1" id="card-p1">
        <div class="turn-badge">TURN</div>
        <div class="player-avatar" id="avatar-p1"></div>
        <div class="player-name" id="pname-p1">P1</div>
        <div class="score-big" id="score-p1">0</div>
      </div>
      <div class="player-card p2" id="card-p2">
        <div class="turn-badge">TURN</div>
        <div class="player-avatar" id="avatar-p2"></div>
        <div class="player-name" id="pname-p2">P2</div>
        <div class="score-big" id="score-p2">0</div>
      </div>
    </div>
    <div class="board-area">
      <div class="board-wrapper"><canvas id="board-canvas"></canvas></div>
    </div>
  </div>
  <div class="overlay-bg" id="overlayBg"></div>

  <script>
    // transparent=<float 0-1>: alpha of the purple body background (default 1 = fully visible)
    // Does NOT affect the board tiles or player cards — only the bg color/gradient behind everything
    const _params = new URLSearchParams(location.search);
    const _transAlpha = Math.min(1, Math.max(0, parseFloat(_params.get('transparent') ?? '1')));
    window._transparentBg = _transAlpha < 1;
    if (_transAlpha === 0) {
      // Fully transparent — use chroma-key class
      document.documentElement.style.background = 'transparent';

      // Partial — keep body transparent for OBS chroma, but tint the bg overlay element
      document.documentElement.style.background = 'transparent';
      document.body.classList.add('transparent-bg');
    }
    // Drive the dedicated background overlay element's opacity
    document.getElementById('bg-overlay').style.opacity = _transAlpha;

    const socket = io({ query: { type: 'obs' } });
    const PIP = { 1: [4], 2: [0, 8], 3: [0, 4, 8], 4: [0, 2, 6, 8], 5: [0, 2, 4, 6, 8], 6: [0, 2, 3, 5, 6, 8] };
    let tileTypes = [], allTileTypes = [], currentState = null, CFG = { TILES_PER_BOARD: 29, POINT_GOAL: 50, BOARD_COLS: 3 };
    const photos = [null, null], names = ['Player 1', 'Player 2'];
    function initAvatarLetter(idx) {
      const el = document.getElementById('avatar-p' + (idx + 1));
      if (!photos[idx] && el && !el.querySelector('img')) {
        el.textContent = names[idx][0].toUpperCase();
        el.style.color = idx === 0 ? 'var(--p1c)' : 'var(--p2c)';
        el.style.fontSize = 'clamp(16px,2.5vw,28px)';

    }
    let gameStarted = false;

    function tryStart() {
      if (!tileTypes.length) return;
      if (!currentState || currentState.currentPlayer < 0) return;
      gameStarted = true;
      document.getElementById('waiting').style.display = 'none';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        setupBoard();
        if (currentState) renderState(currentState);

    }
    socket.on('stateUpdate', s => {
      currentState = s;
      if (s.playerNames) { names[0] = s.playerNames[0]; names[1] = s.playerNames[1]; document.getElementById('pname-p1').textContent = names[0]; document.getElementById('pname-p2').textContent = names[1]; initAvatarLetter(0); initAvatarLetter(1); }
      if (s.currentPlayer < 0) {
        gameStarted = false;

        tryStart();
      }
    });
    socket.on('tilesUpdate', d => {
      tileTypes = d.tileTypes;
      if (d.allTileTypes) allTileTypes = d.allTileTypes; else allTileTypes = [];
      if (d.CFG) Object.assign(CFG, d.CFG);
      if (gameStarted) {
        requestAnimationFrame(() => requestAnimationFrame(() => { setupBoard(); if (currentState) renderState(currentState); }));
      } else {
        tryStart();
      }
    });
    socket.on('avatarUpdate', d => { const img = new Image(); img.onload = () => { photos[d.index] = img; document.getElementById('avatar-p' + (d.index + 1)).innerHTML = '<img src="' + d.dataUrl + '" alt="">'; if (currentState) drawBoard(currentState); }; img.src = d.dataUrl; });
    const spinT = { mp: null, ep: null };
    function showDice(px, n) { const p = PIP[n] || []; for (let i = 0; i < 9; i++) { const e = document.getElementById(px + i); if (e) e.classList.toggle('show', p.includes(i)); } }
    function startRoll(id, px) { const e = document.getElementById(id); e.classList.add('rolling'); if (spinT[px]) clearInterval(spinT[px]); spinT[px] = setInterval(() => showDice(px, Math.floor(Math.random() * 6) + 1), 70); }
    function finishRoll(id, px, r) { if (spinT[px]) { clearInterval(spinT[px]); spinT[px] = null; } document.getElementById(id).classList.remove('rolling'); showDice(px, r); }

    let dicePopupTimer = null;
    function showDicePopup(playerName) {
      if (dicePopupTimer) { clearTimeout(dicePopupTimer); dicePopupTimer = null; }
      document.getElementById('dicePopupPlayer').textContent = playerName + ' is rolling...';
      const res = document.getElementById('diceResult');
      res.classList.add('hidden');
      document.getElementById('dicePopup').classList.add('show');
      document.getElementById('overlayBg').classList.add('show');
    }
    function resolveDicePopup(playerName, result) {
      finishRoll('main-dice', 'mp', result);
      document.getElementById('dicePopupPlayer').textContent = playerName + ' rolled...';
      const res = document.getElementById('diceResult');
      res.textContent = result;
      // animate the number in
      requestAnimationFrame(() => { res.classList.remove('hidden'); res.classList.add('show'); });
      // keep popup open for 3.5s then close
      dicePopupTimer = setTimeout(() => {
        document.getElementById('dicePopup').classList.remove('show');
        document.getElementById('overlayBg').classList.remove('show');
        res.classList.remove('show'); res.classList.add('hidden');
        dicePopupTimer = null;
      }, 3500);
    }
    socket.on('animEvent', ev => {
      if (ev.type === 'diceStart') { startRoll('main-dice', 'mp'); showDicePopup(names[ev.player]); }
      else if (ev.type === 'diceResult') { resolveDicePopup(names[ev.player], ev.result); }
      else if (ev.type === 'eventDiceStart') { startRoll('main-dice', 'mp'); }
      else if (ev.type === 'tilePopup') {
        finishRoll('main-dice', 'mp', ev.eventDiceResult || 1);
        if (ev.scoreFloat) scoreFloat(ev.scoreFloat.player, ev.scoreFloat.value);
        if (window._spinnerActive) {
          window._pendingPopup = ev;
        } else {
          showPopup(ev.icon, ev.title, ev.desc, ev.duration, ev.overridden);
        }
      }
      else if (ev.type === 'yellowSpin') { spinYellow(ev.labels, ev.winIdx, ev.winIcon, ev.winTitle); }
      else if (ev.type === 'colorSpin') { spinColor(ev.labels, ev.winIdx); }
      else if (ev.type === 'stageUp') { const st = document.getElementById('stageTrans'); st.classList.add('show'); setTimeout(() => { st.classList.remove('show'); }, 3300); }
    });
    function spinColor(labels, winIdx) {
      const ITEM_H = Math.round(window.innerWidth * 0.14);
      const popup = document.getElementById('colorPopup');
      const track = document.getElementById('colorTrack');
      const total = labels.length;
      document.getElementById('colorSpinDesc').textContent = 'Spinning...';
      track.innerHTML = ''; track.style.transition = 'none'; track.style.transform = 'translateY(0)';
      labels.forEach((l, i) => {
        const d = document.createElement('div');
        d.className = 'yellow-spin-item' + (i === total - 1 ? ' selected' : '');
        if (typeof l === 'object' && l !== null) {
          if (l.bg) d.style.background = l.bg;
          d.innerHTML = `<span style="font-size:22px;margin-right:8px">${l.icon || ''}</span>${l.label || ''}`;
        } else { d.textContent = l; }
        track.appendChild(d);
      });
      popup.classList.add('show'); document.getElementById('overlayBg').classList.add('show');
      const finalY = -((total - 1) * ITEM_H) + 8;
      requestAnimationFrame(() => requestAnimationFrame(() => {
        track.style.transition = 'transform 4s cubic-bezier(0.25,0.1,0.1,1)';
        track.style.transform = 'translateY(' + finalY + 'px)';
      }));
      setTimeout(() => {
        const wrapEl = track.closest('.yellow-spinner-wrap');
        if (wrapEl) wrapEl.classList.add('landed');
        const winner = labels[labels.length - 1];
        if (winner) document.getElementById('colorSpinDesc').textContent = `${winner.icon || ''} ${winner.label || ''}!`;
        setTimeout(() => {
          if (wrapEl) wrapEl.classList.remove('landed');
          popup.classList.remove('show');
          document.getElementById('overlayBg').classList.remove('show');
        }, 2500);
      }, 4200);
    }
    function showPopup(icon, title, desc, dur, overridden) {
      if (dicePopupTimer) { clearTimeout(dicePopupTimer); dicePopupTimer = null; }
      document.getElementById('dicePopup').classList.remove('show');
      const d = Math.max(dur * 2, 6000);
      const el = document.getElementById('popIcon');
      el.className = 'pop-icon';
      if (icon === '⭐' || icon === '🌟') { el.textContent = icon; el.classList.add('anim-star'); }
      else if (icon === '💚') { el.textContent = icon; el.classList.add('anim-strong-heart'); }
      else if (icon === '❤️') { el.textContent = icon; el.classList.add('anim-weak-heart'); }
      else if (icon === '💤') { el.textContent = icon; el.classList.add('anim-wobble'); }
      else if (icon === '👟') { el.textContent = icon; el.classList.add('anim-walk'); }
      else if (icon === '💸') { el.textContent = icon; el.classList.add('anim-flap'); }
      else if (icon.startsWith('💜⬆')) { el.classList.add('anim-purple'); el.innerHTML = '<span class="pi-heart">💜</span><span class="pi-arrow-up">⬆️</span>'; }
      else if (icon.startsWith('💜⬇')) { el.classList.add('anim-purple'); el.innerHTML = '<span class="pi-heart">💜</span><span class="pi-arrow-down">⬇️</span>'; }
      else { el.textContent = icon; }
      document.getElementById('popTitle').textContent = title;
      document.getElementById('popDesc').textContent = desc;
      const pill = document.getElementById('overridePill');
      if (overridden) { pill.classList.add('show'); } else { pill.classList.remove('show'); }
      const f = document.getElementById('dismissFill'); f.style.transition = 'none'; f.style.width = '100%';
      document.getElementById('eventPopup').classList.add('show'); document.getElementById('overlayBg').classList.add('show');
      setTimeout(() => { f.style.transition = 'width ' + d + 'ms linear'; f.style.width = '0%'; }, 50);
      setTimeout(() => { document.getElementById('eventPopup').classList.remove('show'); document.getElementById('overlayBg').classList.remove('show'); pill.classList.remove('show'); }, d + 100);
    }
    function spinYellow(labels, winIdx, winIcon, winTitle) {
      const ITEM_H = Math.round(window.innerWidth * 0.14);
      const popup = document.getElementById('yellowPopup');
      const track = document.getElementById('yellowTrack');
      const total = labels.length;
      window._spinnerActive = true;
      window._pendingPopup = null;
      document.getElementById('yellowIcon').textContent = '⭐';
      document.getElementById('yellowSpinDesc').textContent = 'Landing on...';
      track.innerHTML = ''; track.style.transition = 'none'; track.style.transform = 'translateY(0)';
      labels.forEach((l, i) => {
        const d = document.createElement('div');
        d.className = 'yellow-spin-item' + (i === total - 1 ? ' selected' : '');
        if (typeof l === 'object' && l !== null) {
          if (l.bg) d.style.background = l.bg;
          d.innerHTML = `<span style="font-size:22px;margin-right:8px">${l.icon || ''}</span>${l.label || ''}`;
        } else {
          d.textContent = l;
        }
        track.appendChild(d);
      });
      document.getElementById('yellowSpinDesc').textContent = 'Landing on...';
      popup.classList.add('show'); document.getElementById('overlayBg').classList.add('show');
      const finalY = -((total - 1) * ITEM_H) + 8;
      requestAnimationFrame(() => requestAnimationFrame(() => {
        track.style.transition = 'transform 4s cubic-bezier(0.25,0.1,0.1,1)';
        track.style.transform = 'translateY(' + finalY + 'px)';
      }));
      setTimeout(() => {
        const wrapEl = track.closest('.yellow-spinner-wrap');
        if (wrapEl) wrapEl.classList.add('landed');
        // Update icon and title to reflect what was selected
        const yellowWinner = labels[labels.length - 1];
        document.getElementById('yellowIcon').textContent = winIcon || (yellowWinner && yellowWinner.icon) || '⭐';
        document.getElementById('yellowSpinDesc').textContent = winTitle || (yellowWinner && yellowWinner.label) || '';
        setTimeout(() => {
          if (wrapEl) wrapEl.classList.remove('landed');
          popup.classList.remove('show');
          document.getElementById('overlayBg').classList.remove('show');
          window._spinnerActive = false;
          // Fire any popup that arrived while spinner was showing
          if (window._pendingPopup) {
            const p = window._pendingPopup; window._pendingPopup = null;
            setTimeout(() => showPopup(p.icon, p.title, p.desc, p.duration, p.overridden), 200);
          }
        }, 2500);
      }, 4200);
    }
    function scoreFloat(pi, val) { if (!currentState) return; const game = tilePos._game || tilePos; const t = game[Math.min(currentState.players[pi].tile, game.length - 1)]; if (!t) return; const rect = canvas.getBoundingClientRect(), el = document.createElement('div'); el.className = 'score-float'; el.style.left = (rect.left + t.cx) + 'px'; el.style.top = (rect.top + t.cy) + 'px'; el.style.color = val >= 0 ? '#00f5d4' : '#ff4d6d'; el.textContent = (val >= 0 ? '+' : '') + val; document.body.appendChild(el); setTimeout(() => el.remove(), 1400); }
    function renderState(s) {
      for (let i = 0; i < 2; i++) { document.getElementById('score-p' + (i + 1)).textContent = s.players[i].score; }
      document.getElementById('card-p1').classList.toggle('active', s.currentPlayer === 0);
      document.getElementById('card-p2').classList.toggle('active', s.currentPlayer === 1);
      if (s.gameOver) { const w = s.players[0].score >= (CFG.POINT_GOAL || 50) ? 0 : 1; document.getElementById('winTitle').textContent = names[w] + ' Wins!'; document.getElementById('winSub').textContent = names[0] + ': ' + s.players[0].score + ' pts | ' + names[1] + ': ' + s.players[1].score + ' pts'; setTimeout(() => document.getElementById('winScreen').classList.add('show'), 800); }
      else { document.getElementById('winScreen').classList.remove('show'); }
      drawBoard(s);
    }
    const canvas = document.getElementById('board-canvas'), ctx = canvas.getContext('2d');
    let tilePos = [];
    const TILE_C = {
      blue: { t: '#a0a4b8', b: '#4b667d', l: '#0c3670', r: '#fff2ed' },
      start: { t: '#2ec970', b: '#0f9e48', l: '#056028', r: '#fff2ed' },
      stageup: { t: '#f0901a', b: '#be5c00', l: '#753800', r: '#fff2ed' },
      green: { t: '#a4af9e', b: '#4f7851', l: '#055220', r: '#fff2ed' },
      purple: { t: '#a985b1', b: '#57327d', l: '#360a72', r: '#fff2ed' },
      red: { t: '#c77685', b: '#8b2336', l: '#650000', r: '#fff2ed' },
      yellow: { t: '#e3baa8', b: '#b0734f', l: '#6e5500', r: '#fff2ed' },
    };
    const TICON = { green: null, purple: null, red: null, yellow: null, stageup: '🏆', start: '🚀', blue: null };

    // OBS: tile 0 (start/🚀) at bottom, tile N-1 (stageup/🏆) at top-left.
    // Row 0 is topmost, RTL so it ends at left (last tile = top-left = stageup).
    function computeWindingPath(W, H, N, ts, COLS) {
      const ROWS = Math.ceil(N / COLS);
      const gridW = COLS * ts;
      const gridH = (2 * ROWS - 1) * ts;
      const leftX = Math.round((W - gridW) / 2) + ts / 2;
      const topY = Math.round((H - gridH) / 2) + ts / 2;

      // Build allPts in reverse path order (tile N-1 first → tile 0 last)
      // so that when we reverse them, tile 0 = bottom, tile N-1 = top-left
      const allPts = [];
      for (let row = 0; row < ROWS; row++) {
        const ltr = (row % 2 !== 0);
        const rowY = topY + row * ts * 2;
        const tilesInRow = Math.min(COLS, N - row * COLS);
        for (let col = 0; col < tilesInRow; col++) {
          const gc = ltr ? col : (COLS - 1 - col);
          allPts.push({ x: leftX + gc * ts, y: rowY, connector: false });
        }
        if (row < ROWS - 1) {
          const lastGc = ltr ? (tilesInRow - 1) : (COLS - tilesInRow);
          allPts.push({ x: leftX + lastGc * ts, y: rowY + ts, connector: true });
        }
      }

      allPts.reverse();

      const centres = allPts.map((p, i) => {
        let ni = i + 1;
        while (ni < allPts.length && allPts[ni].connector) ni++;
        if (ni >= allPts.length) ni = i;
        const nx = allPts[ni];
        const dx = nx.x - p.x, dy = nx.y - p.y;
        let angle;
        if (Math.abs(dx) >= Math.abs(dy)) {
          angle = dx >= 0 ? 0 : Math.PI;
        } else {
          angle = dy >= 0 ? Math.PI / 2 : -Math.PI / 2;
        }
        return { x: p.x, y: p.y, angle, connector: p.connector };
      });
      return { centres };
    }

    function setupBoard() {
      const wr = canvas.parentElement, rect = wr.getBoundingClientRect();
      canvas.width = Math.floor(rect.width); canvas.height = Math.floor(rect.height);
      const W = canvas.width, H = canvas.height, N = tileTypes.length; if (!N) return;
      const cfgCols = Math.max(3, Math.min(CFG.BOARD_COLS || 5, 12));
      let bestS = 0, bestCOLS = cfgCols, bestROWS = Math.ceil(N / cfgCols);
      for (let c = 3; c <= 12; c++) {
        const r = Math.ceil(N / c);
        const tw = Math.floor((W - 32) / c);
        const th = Math.floor((H - 32) / (2 * r - 1));
        const ts2 = Math.max(14, Math.min(tw, th, 110));
        if (ts2 > bestS) { bestS = ts2; bestCOLS = c; bestROWS = r; }
      }
      const COLS = bestCOLS, ROWS = bestROWS;
      const ts = bestS;
      const { centres } = computeWindingPath(W, H, N, ts, COLS);
      tilePos = centres.map(({ x, y, angle, connector }) => ({ cx: x, cy: y, x: x - ts / 2, y: y - ts / 2, w: ts, h: ts, s: ts, angle: angle || 0, connector: connector || false }));
      tilePos._game = tilePos.filter(t => !t.connector);
      if (currentState) drawBoard(currentState);
    }

    function drawTileObs(t, type) {
      const c = TILE_C[type] || TILE_C.blue;
      const { cx, cy, w, h } = t, rad = Math.max(6, w * .20);
      const hw = w / 2, hh = h / 2, tx = -hw, ty = -hh;
      ctx.save();
      ctx.translate(cx, cy);
      // NO rotation — tiles always axis-aligned
      const g = ctx.createLinearGradient(tx, ty, tx, ty + h); g.addColorStop(0, c.t); g.addColorStop(1, c.b);
      ctx.fillStyle = g; rr(tx, ty, w, h, rad); ctx.fill();
      const sh = ctx.createLinearGradient(tx, ty, tx, ty + h * .35); sh.addColorStop(0, 'rgba(255,255,255,.30)'); sh.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = sh; rr(tx + 2, ty + 2, w - 4, h * .35, rad * .6); ctx.fill();

      //ctx.strokeStyle='rgba(0,0,0,0.7)';ctx.lineWidth=3.5;rr(tx,ty,w,h,rad);ctx.stroke();

      ctx.strokeStyle = c.r; ctx.lineWidth = 1.8; rr(tx, ty, w, h, rad); ctx.stroke();
      const ic = TICON[type];
      if (ic) {
        ctx.font = `${Math.max(14, w * 0.52)}px serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 4;
        ctx.fillText(ic, 0, 0);
        ctx.shadowBlur = 0;
      }
      ctx.restore();
    }

    function drawBoard(s) {
      if (!tilePos.length) return;
      const W = canvas.width, H = canvas.height; ctx.clearRect(0, 0, W, H);
      // Background is handled by #bg-overlay — canvas stays transparent
      // Draw all tiles — connectors use 'blue' type, game tiles use their type
      const ag = s && s.allGreen > 0;
      let gameIdx = 0;
      for (let i = 0; i < tilePos.length; i++) {
        const t = tilePos[i]; if (!t) continue;
        const flatType = (allTileTypes.length ? allTileTypes[i] : null)
          || (t.connector ? 'blue' : tileTypes[gameIdx] || 'blue');
        if (!t.connector) gameIdx++;
        const visual = (ag && flatType !== 'start' && flatType !== 'stageup') ? 'green' : flatType;
        drawTileObs(t, visual, t.connector ? null : gameIdx - 1);
      }
      // Effect badges


      if (!s || !s.players) return;
      const same = s.players[0].flatPos === s.players[1].flatPos;
      drawTok(s.players[0].flatPos ?? 0, '#ff0d0d', 0, same ? -1 : 0); 
      drawTok(s.players[1].flatPos ?? 0, '#21f0ff', 1, same ? 1 : 0);
    }

    function drawTok(fi, col, pi, off) {
      const t = tilePos[Math.min(fi, tilePos.length - 1)]; if (!t) return;
      // Token radius: 42% of tile but with a generous minimum so it reads at small sizes
      const r = Math.max(t.s * .38, 14);
      const ox = off * r * 0.85, cx = t.cx + ox, cy = t.cy;
      ctx.save();

      // Dark backdrop so token always contrasts against any tile colour
      ctx.beginPath(); ctx.arc(cx, cy, r + 3, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fill();

      // Fill base circle — no glow
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fillStyle = col; ctx.fill();

      // Photo or initial letter
      const ph = photos[pi];
      if (ph) {
        ctx.save(); ctx.beginPath(); ctx.arc(cx, cy, r * .9, 0, Math.PI * 2); ctx.clip();
        ctx.drawImage(ph, cx - r * .9, cy - r * .9, r * 1.8, r * 1.8); ctx.restore();
      } else {
        // Solid fill so letter is legible
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fillStyle = col; ctx.fill();
        ctx.fillStyle = '#fff2ed';
        ctx.font = `bold ${Math.max(r * .9, 11)}px Fredoka One,cursive`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(names[pi][0].toUpperCase(), cx, cy + 1);
      }

      // Thick white ring — very visible at any size
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 3; ctx.stroke();

      // Coloured outer ring for extra pop
      ctx.beginPath(); ctx.arc(cx, cy, r + 3, 0, Math.PI * 2);
      ctx.strokeStyle = col; ctx.lineWidth = 2.5; ctx.stroke();

      // Direction arrow — always a clean cardinal angle from path builder
      const ang = t.angle || 0;
      const tip = r + 14, base = r * 0.9;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(ang);
      ctx.beginPath();
      ctx.moveTo(tip + base * 0.8, 0);
      ctx.lineTo(tip - base * 0.2, -base * 0.5);
      ctx.lineTo(tip - base * 0.2, base * 0.5);
      ctx.closePath();
      ctx.fillStyle = '#fff2ed'; ctx.globalAlpha = 0.95; ctx.fill();
      ctx.strokeStyle = col; ctx.lineWidth = 2; ctx.stroke();
      ctx.restore();

      ctx.restore();
    }

    function rr(x, y, w, h, r) { ctx.beginPath(); ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r); ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h); ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r); ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y); ctx.closePath(); }
    window.addEventListener('load', () => {
      showDice('mp', 1); initAvatarLetter(0); initAvatarLetter(1);
      document.getElementById('popIcon').textContent = String.fromCodePoint(0x2B50);
      document.getElementById('yellowIcon').textContent = String.fromCodePoint(0x2B50);
    });
    window.addEventListener('resize', () => { if (tileTypes.length) setupBoard(); });
  </script>
</body>
